# ============================================================
#  NEXO I+D · Constructora Independencia
#  docker-compose PRODUCCIÓN
#  Uso: docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

services:

  # ── Base de datos ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-nexo_id}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── API / Backend ────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: nexo-backend
    restart: unless-stopped
    environment:
      NODE_ENV:               production
      DATABASE_URL:           postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexo_id}
      JWT_SECRET:             ${JWT_SECRET}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-2h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN:            ${CORS_ORIGIN:-http://localhost}
      BCRYPT_COST:            ${BCRYPT_COST:-12}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (nginx) ─────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: nexo-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
